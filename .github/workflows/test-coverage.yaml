on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: test-coverage

permissions: read-all

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      # Tier 2 integration tests guard on skip_on_cran(), which skips unless
      # NOT_CRAN == "true". Setting it here is NOT sufficient on its own:
      # covr::package_coverage() runs the test suite in a separate callr
      # session built from rcmd_safe_env(), which does not inherit this
      # job-level variable. tests/testthat/setup.R re-asserts NOT_CRAN inside
      # that session when R_COVR is set, which is what actually un-skips the
      # integration tier. This entry is kept as documentation / belt-and-braces.
      NOT_CRAN: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # RcppParallel 6.0.0 (2026-07-23) -> oneTBB removes tbb::internal, so any
      # stringfish binary built against the old TBB fails to LOAD (qs2 -> stringfish,
      # and rxode2 Imports qs2). ABI/stale-artifact, not a source incompatibility --
      # see the long note in R-CMD-check.yaml. Must run BEFORE setup-r-dependencies
      # because the failure occurs during dependency installation.
      # DROP once CRAN/RSPM ship stringfish/qs2 rebuilt against RcppParallel >= 6.
      - name: Rebuild TBB-linked deps from source (RcppParallel 6.0.0 ABI)
        if: runner.os != 'macOS'
        run: |
          install.packages("RcppParallel", repos = "https://cloud.r-project.org")
          install.packages(c("stringfish", "qs2"), type = "source",
                           repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 2
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          file: ./cobertura.xml
          plugin: noop
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
