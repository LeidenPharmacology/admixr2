on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

name: compat-oldstack

# Runs the FULL integration suite (NOT_CRAN=true) against the packages CRAN
# currently serves (public RSPM = current CRAN: rxode2 5.1.2 / nlmixr2est 6.0.1),
# NOT the r-universe pre-release (rxode2 5.1.3 / nlmixr2est 6.2.0). R-CMD-check
# and CRAN's own incoming check skip these tests (skip_on_cran), so this is the
# only signal that the sensitivity feature DEGRADES GRACEFULLY on the older stack
# -- e.g. a dosing modifier whose jump derivative 5.1.2 lacks must fall back to
# finite differences, not error. The jump-dependent tests are expected to SKIP
# here; nothing should FAIL.

permissions: read-all

jobs:
  integration-oldstack:
    runs-on: ubuntu-latest
    name: integration tests on current-CRAN stack

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # glibc arena retention across many rxode2 fits inflates RSS on ubuntu; cap
      # arenas so the heavy integration suite does not OOM (see the teardown fix).
      MALLOC_ARENA_MAX: "2"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true          # current CRAN, NOT r-universe

      # RcppParallel 6.0.0 (2026-07-23) -> oneTBB removes tbb::internal, so any
      # stringfish binary built against the old TBB fails to LOAD (qs2 -> stringfish,
      # and rxode2 Imports qs2). ABI/stale-artifact, not a source incompatibility --
      # see the long note in R-CMD-check.yaml. Must run BEFORE setup-r-dependencies
      # because the failure occurs during dependency installation.
      # DROP once CRAN/RSPM ship stringfish/qs2 rebuilt against RcppParallel >= 6.
      - name: Rebuild TBB-linked deps from source (RcppParallel 6.0.0 ABI)
        if: runner.os != 'macOS'
        run: |
          install.packages("RcppParallel", repos = "https://cloud.r-project.org")
          install.packages(c("stringfish", "qs2"), type = "source",
                           repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 2
          extra-packages: any::testthat
          needs: check                    # pulls Suggests (rxode2, nlmixr2, mirai, ...)

      - name: Confirm this is the OLD (current-CRAN) stack
        run: |
          Rscript -e '
            rx <- as.character(packageVersion("rxode2"))
            ne <- as.character(packageVersion("nlmixr2est"))
            cat(sprintf("rxode2=%s  nlmixr2est=%s\n", rx, ne))
            if (utils::compareVersion(rx, "5.1.3") >= 0)
              cat("::warning::rxode2 >= 5.1.3 -- CRAN has caught up; this job now tests the NEW stack.\n")
          '
        shell: bash

      # Install (not load_all) so the mirai daemons in the parallel test load the
      # SAME admixr2 build the parent runs. devtools::load_all() would leave the
      # daemons on an absent/stale INSTALLED package -> workers silently diverge
      # from the sequential fit (the documented dev-mode parallel caveat).
      - name: Install admixr2
        run: |
          # Drop the git-tracked Windows build artifacts (src/*.o, *.dll): installing
          # from the working dir would otherwise LINK the stale Windows nll.o on Linux
          # ("dangerous relocation: R_AMD64_IMAGEBASE"). R CMD build cleans these when
          # it makes a tarball, which is why the full R-CMD-check is unaffected.
          rm -f src/*.o src/*.so src/*.dll
          R CMD INSTALL --no-multiarch --with-keep.source .
        shell: bash

      - name: Run integration suite with NOT_CRAN=true
        env:
          NOT_CRAN: "true"
        run: |
          Rscript -e '
            Sys.setenv(NOT_CRAN = "true")
            library(admixr2)
            res <- testthat::test_dir("tests/testthat", filter = "integration",
                                      reporter = "summary", stop_on_failure = FALSE)
            df  <- as.data.frame(res)
            failed  <- sum(df$failed)
            errored <- if ("error" %in% names(df)) sum(df$error) else 0
            skipped <- if ("skipped" %in% names(df)) sum(df$skipped) else
                       if ("skip" %in% names(df)) sum(df$skip) else 0
            passed  <- sum(df$passed)
            cat(sprintf("\nINTEGRATION (old stack): passed=%d failed=%d errored=%d skipped=%d\n",
                        passed, failed, errored, skipped))
            cat("Skips are expected (jump-dependent paths fall back to FD on 5.1.2).\n")
            if (failed > 0 || errored > 0) {
              cat("::error::integration tests FAILED/ERRORED on the current-CRAN stack\n")
              quit(status = 1)
            }
          '
        shell: bash
