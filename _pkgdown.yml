url: https://leidenpharmacology.github.io/admixr2

template:
  bootstrap: 5
  light-switch: true
  theme: arrow-light          # code highlighting (light)
  theme-dark: arrow-dark      # code highlighting (dark)
  bslib:
    # ── Leiden Clinical palette (deep navy + logo orange) ──
    bg: "#FBFBFC"
    fg: "#1A1A1A"
    primary: "#001158"        # deep Leiden navy — buttons, active nav, accents
    secondary: "#DD6B2A"      # logo orange — CTAs, section kickers
    success: "#2F7D51"
    info: "#123A99"
    warning: "#B5761E"
    danger: "#B23B2E"
    link-color: "#123A99"     # readable navy-blue (primary itself is near-black)
    code-bg: "#F4F5F7"
    border-color: "#E5E7EB"
    border-radius: "0.5rem"
    # ── Typography ──
    base_font: { google: "IBM Plex Sans" }
    heading_font: { google: "Fraunces" }
    code_font: { google: "JetBrains Mono" }
    line-height-base: 1.6
    font-scale: 1.0
    # ── Navbar background per mode (accent stays navy) ──
    navbar-light-bg: "#FFFFFF"
    navbar-dark-bg: "#0B1020"
  includes:
    in_header: |
      <meta name="theme-color" content="#001158">

home:
  title: admixr2 — Aggregate Data Modelling in R
  description: >
    A meta-analysis framework for population PK/PD — fit models to summary-level
    data (means and covariances per study) or to previously published PK/PD
    models, in the nlmixr2 / rxode2 ecosystem.
  sidebar: false          # full-width custom home (hero carries its own content)

navbar:
  structure:
    left: [intro, blog, vignettes, reference]
    right: [search, github, lightswitch]
  components:
    blog:
      text: Blog
      menu:
        - text: The mathematics of aggregate data modelling
          href: articles/introducing-admixr2.html
    vignettes:
      text: Vignettes
      menu:
        - text: Getting started
        - text: Introduction to admixr2
          href: articles/admixr2.html
        - text: "---"
        - text: Inputs — data & models
        - text: From a published figure to E, V and n
          href: articles/aggregate-data.html
        - text: Simulating data & using published models
          href: articles/datagen.html
        - text: "---"
        - text: Meta-analysis across studies
        - text: Multiple studies
          href: articles/multiple-studies.html
        - text: Several outputs (plasma + brain)
          href: articles/multi-compartment.html
        - text: PD and PK/PD data
          href: articles/pkpd.html
        - text: "---"
        - text: Estimation & diagnostics
        - text: Comparing the estimators
          href: articles/estimator-comparison.html
        - text: Choosing a residual error model
          href: articles/error-models.html
        - text: Advanced usage
          href: articles/advanced.html
        - text: Diagnostic plots
          href: articles/diagnostic-plots.html
    github:
      icon: fab fa-github
      href: https://github.com/LeidenPharmacology/admixr2
      aria-label: GitHub

articles:
  - title: Blog
    navbar: Blog
    contents:
      - articles/introducing-admixr2

  - title: Getting started
    desc: Install admixr2 and fit your first model to aggregate data.
    contents:
      - admixr2

  - title: Inputs — data & models
    desc: >
      The two ways to feed a meta-analysis — digitized study summaries, or
      previously published PK/PD models.
    contents:
      - aggregate-data
      - datagen

  - title: Meta-analysis across studies
    desc: >
      Combine evidence across sources — several studies, several observed
      outputs, and PD / PK-PD endpoints.
    contents:
      - multiple-studies
      - multi-compartment
      - pkpd

  - title: Estimation & diagnostics
    desc: Choose and tune an estimator — gradients, restarts, model comparison — then assess the fit.
    contents:
      - estimator-comparison
      - error-models
      - advanced
      - diagnostic-plots

reference:
  - title: Fitting
    desc: Main entry point and data helper.
    contents:
      - admData
      - nlmixr2Est.adfo
      - nlmixr2Est.admc
      - nlmixr2Est.adgh
      - nlmixr2Est.adirmc

  - title: Simulation
    desc: Generate aggregate data from models for simulation studies.
    contents:
      - datagen
      - datagenControl

  - title: Control objects
    desc: Configuration for each estimator.
    contents:
      - adfoControl
      - admControl
      - adghControl
      - adirmcControl
      - admStopWorkers

  - title: Methods
    desc: S3 methods for fit objects.
    contents:
      - print.admFit
      - plot.admFit

  - title: Data
    desc: Example datasets.
    contents:
      - examplomycin
