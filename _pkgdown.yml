url: https://leidenpharmacology.github.io/admixr2

template:
  bootstrap: 5
  bootswatch: cosmo
  theme: arrow-light
  bslib:
    # FeRx-inspired slate/oxide palette
    bg: "#F7F6F3"
    fg: "#1A2332"
    primary: "#1F6B7A"
    secondary: "#455066"
    success: "#4A6B5D"
    danger: "#C9582A"
    warning: "#C8893E"
    info: "#1F6B7A"
    # Typography
    base_font:
      google: "IBM Plex Sans"
    heading_font:
      google: "Fraunces"
    code_font:
      google: "JetBrains Mono"
    line-height-base: 1.55

home:
  title: admixr2 — Aggregate Data Modelling in R
  description: >
    Fit pharmacometric PK/PD models to aggregate-level data (mean vector and
    covariance matrix per study) using the nlmixr2/rxode2 ecosystem.

navbar:
  structure:
    left: [intro, blog, vignettes, reference]
    right: [search, github]
  components:
    blog:
      text: Blog
      menu:
        - text: The mathematics of aggregate data modelling
          href: articles/introducing-admixr2.html
    vignettes:
      text: Vignettes
      menu:
        - text: Getting started
          href: articles/admixr2.html
        - text: From a published figure to E, V and n
          href: articles/aggregate-data.html
        - text: Diagnostic plots
          href: articles/diagnostic-plots.html
        - text: Multiple studies
          href: articles/multiple-studies.html
        - text: Plasma and brain (several outputs)
          href: articles/multi-compartment.html
        - text: PD and PK/PD — what data do you need?
          href: articles/pkpd.html
        - text: Estimator comparison
          href: articles/estimator-comparison.html
        - text: Advanced usage
          href: articles/advanced.html
        - text: Data generation
          href: articles/datagen.html
    github:
      icon: fab fa-github
      href: https://github.com/LeidenPharmacology/admixr2
      aria-label: GitHub

articles:
  - title: Blog
    navbar: Blog
    contents:
      - articles/introducing-admixr2
  - title: Vignettes
    navbar: Vignettes
    contents:
      - admixr2
      - aggregate-data
      - diagnostic-plots
      - multiple-studies
      - multi-compartment
      - pkpd
      - estimator-comparison
      - advanced
      - datagen

reference:
  - title: Fitting
    desc: Main entry point and data helper.
    contents:
      - admData
      - nlmixr2Est.adfo
      - nlmixr2Est.admc
      - nlmixr2Est.adgh
      - nlmixr2Est.adirmc

  - title: Simulation
    desc: Generate aggregate data from models for simulation studies.
    contents:
      - datagen
      - datagenControl

  - title: Control objects
    desc: Configuration for each estimator.
    contents:
      - adfoControl
      - admControl
      - adghControl
      - adirmcControl
      - admStopWorkers

  - title: Methods
    desc: S3 methods for fit objects.
    contents:
      - print.admFit
      - plot.admFit

  - title: Data
    desc: Example datasets.
    contents:
      - examplomycin
